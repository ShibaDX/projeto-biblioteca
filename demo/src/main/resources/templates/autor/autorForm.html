<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Autor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div th:replace="index :: menu"></div>
<div class="container">
    <form th:action="@{/autores/salvar}" th:object="${autor}" method="post">

        <input type="hidden" th:field="*{id}"/>

        <div class="row mt-3">
            <div class="col">
                <label for="nome" class="form-label">Nome</label>
                <input id="nome" type="text" class="form-control"
                       placeholder="Nome" th:field="*{nome}">

                <div th:if="${#fields.hasErrors('nome')}"
                     th:errors="*{nome}"
                     class="text-danger small mt-1">
                </div>
            </div>

            <div class="col">
                <label for="nacionalidade" class="form-label">Nacionalidade</label>
                <input id="nacionalidade" type="text" class="form-control"
                       placeholder="Nacionalidade" th:field="*{nacionalidade}">
            </div>
        </div>


<div class="row mt-3">
    <div class="p-3 m-0 border-0 bd-example m-0 border-0">
        <div class="d-grid gap-2 d-md-block">
            <input class="btn btn-primary" type="submit" value="Salvar"/>
        </div>
    </div>
</div>
</form>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
