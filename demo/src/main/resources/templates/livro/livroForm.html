<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Livro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div th:replace="index :: menu"></div>
<div class="container">
    <form th:action="@{/livros/salvar}" th:object="${livro}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="row mt-3">
            <div class="col-8">
                <label for="titulo" class="form-label">Título</label>
                <input id="titulo" type="text" class="form-control"
                       placeholder="Ex: O Pequeno Príncipe, Os Sertões" th:field="*{titulo}">
                <div th:if="${#fields.hasErrors('titulo')}"
                     th:errors="*{titulo}"
                     class="text-danger small mt-1">
                </div>
            </div>

            <div class="col-4">
                <label for="anoPublicacao" class="form-label">Ano de Publicação</label>
                <input id="anoPublicacao" type="number" class="form-control"
                       placeholder="Ex: 2012" th:field="*{anoPublicacao}">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-6">
                <label for="isbn" class="form-label">ISBN</label>
                <input id="isbn" type="text" class="form-control"
                       placeholder="Ex: 978-85-08-15361-9" th:field="*{isbn}">
                <div th:if="${#fields.hasErrors('isbn')}"
                     th:errors="*{isbn}"
                     class="text-danger small mt-1">
                </div>
            </div>

            <div class="col-6">
                <label for="autor" class="form-label">Autor</label>
                <select id="autor" class="form-select" th:field="*{autor}" required>
                    <option value="" disabled selected>Selecione um autor...</option>

                    <option th:each="a : ${autores}"
                            th:value="${a.id}"
                            th:text="${a.nome}">
                    </option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="p-3 m-0 border-0 bd-example m-0 border-0">
                <div class="d-grid gap-2 d-md-block">
                    <input class="btn btn-primary" type="submit" value="Salvar"/>
                </div>
            </div>
        </div>
    </form>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
